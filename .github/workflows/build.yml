name: Windows Static Release Build

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. Скачиваем код репозитория
    - name: Checkout repository
      uses: actions/checkout@v4

# 2. Конфигурируем CMake
    - name: Configure CMake
      shell: pwsh
      env:
        VCPKG_ROOT: C:\vcpkg
      run: |
        cmake -B build `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
          -DVCPKG_TARGET_TRIPLET=x64-windows-static

    # 3. Собираем проект в режиме Release
    - name: Build Project
      run: cmake --build build --config Release

    # 4. Выкладываем готовый монолитный .exe в артефакты
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tg-ws-proxy-windows-x64
        path: build/Release/tg-ws-proxy-C.exe